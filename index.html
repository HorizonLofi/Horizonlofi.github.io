<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic NFT Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Arial;
}

/* NFT Container 512x512 */
.nft-box{
  width:512px;
  height:512px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* NFT Image */
.nft-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.4s ease;
}

/* Overlay Buttons */
.buttons{
  position:absolute;
  top:10px;
  right:10px;
  display:flex;
  gap:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.2);
  color:white;
  backdrop-filter:blur(8px);
  transition:0.3s;
}

button:hover{
  background:rgba(255,255,255,0.4);
  transform:scale(1.05);
}

/* Active button */
button.active{
  background:#38bdf8;
  color:black;
}

/* Mobile responsive */
@media(max-width:600px){
  .nft-box{
    width:90vw;
    height:90vw;
  }
}
</style>
</head>

<body>

<div class="nft-box">
  <img id="nftImage" src="">

  <div class="buttons">
    <button class="active" onclick="changeImage(1)">HL</button>
    <button onclick="changeImage(2)">ORG</button>
  </div>
</div>

<script>
// Base URL for GIF folder
const baseUrl = "https://raw.githubusercontent.com/HorizonLofi/Horizonlofi.github.io/main/Gif/";

// img2 fixed (unchanged)
const img2 = "https://raw.githubusercontent.com/HorizonLofi/Horizonlofi.github.io/main/2.gif";

// Function to extract token ID from URL
function getTokenId() {
    let tokenId = null;
    
    // Method 1: Check referrer for OpenSea URL
    if (document.referrer && document.referrer.includes('opensea.io')) {
        const match = document.referrer.match(/\/(\d+)(?:\?|$)/);
        if (match) tokenId = match[1];
    }
    
    // Method 2: Get tokenId from URL parameter (e.g., ?tokenId=30)
    if (!tokenId) {
        const urlParams = new URLSearchParams(window.location.search);
        tokenId = urlParams.get('tokenId');
    }
    
    // Method 3: Get from URL path (e.g., /30)
    if (!tokenId) {
        const pathSegments = window.location.pathname.split('/');
        for (let i = pathSegments.length - 1; i >= 0; i--) {
            if (pathSegments[i] && !isNaN(pathSegments[i]) && pathSegments[i].trim() !== "") {
                tokenId = pathSegments[i];
                break;
            }
        }
    }
    
    // Method 4: Get from hash (e.g., #30)
    if (!tokenId && window.location.hash) {
        const hash = window.location.hash.substring(1);
        if (!isNaN(hash) && hash !== "") {
            tokenId = hash;
        }
    }
    
    // Default to 1 if no token ID found
    return tokenId || "1";
}

// Get current token ID
const currentTokenId = getTokenId();

// Construct img1 dynamically
const img1 = `${baseUrl}${currentTokenId}.gif`;

const nftImage = document.getElementById("nftImage");
const buttons = document.querySelectorAll("button");

// Set initial image
nftImage.src = img1;

function changeImage(num){
  if(num === 1){
    nftImage.src = img1;
  } else {
    nftImage.src = img2;
  }

  buttons.forEach(b => b.classList.remove("active"));
  buttons[num-1].classList.add("active");
}

// Debug information
console.log(`Token ID: ${currentTokenId}`);
console.log(`Image URL: ${img1}`);
</script>

</body>
</html>
